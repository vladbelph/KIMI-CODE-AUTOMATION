spec:
  version: "1.2.0"
  name: "kimi-cli-integration"
  description: "Integration spec for VPS Dev Agent with Kimi Code CLI batch execution"
  
  #
  # 1. ARCHITECTURE & EXECUTION FLOW
  #
  execution_flow:
    type: "batch_loop"
    description: "Agent manages the loop, Kimi acts as execution engine only"
    
    loop_logic:
      condition: "while pending tasks exist AND subscription limit not reached"
      steps:
        - name: fetch_task
          query: "SELECT * FROM tasks WHERE status='pending' ORDER BY priority DESC LIMIT 1"
          
        - name: preflight_check
          action: "check_kimi_limits"
          on_limit_reached: "pause_queue"
          
        - name: prepare_context
          actions:
            - "create_git_backup"
            - "format_prompt_from_spec"
            - "prepare_isolated_workspace"
            
        - name: execute
          actor: "kimi_cli"
          timeout: "from spec.execution.timeout_minutes"
          
        - name: parse_result
          extract:
            - files_modified
            - summary
            - exit_code
            
        - name: validate
          run: "spec.validation.commands"
          
        - name: finalize
          on_success: "git_commit + mark_completed"
          on_failure: "git_rollback + mark_failed + archive_lesson"
          
        - name: next_iteration
          action: "immediate_next_task_if_success"

  #
  # 2. KIMI CLI INTERFACE
  #
  kimi_interface:
    preferred_method: "native_batch"
    fallback_method: "expect_wrapper"
    
    native_batch:
      command_template: |
        kimi execute \
          --task-id {task_id} \
          --prompt-file {temp_prompt_path} \
          --working-dir {project_repo} \
          --output-format json \
          --auto-apply {auto_apply} \
          --timeout {timeout}m
      output_format: "json"
      schema:
        exit_code: "integer (0=success, 1=error, 2=needs_clarification)"
        files_modified: "array of objects: {path, operation, content}"
        summary: "string (for git commit message)"
        tokens_used: "integer"
        
    expect_wrapper:
      description: "Python pexpect wrapper for interactive mode fallback"
      implementation: "vps_dev_agent.bridges.kimi_cli.expect_driver"
      prompts:
        ready: "moonshot@kimi-cli"
        confirm: "Apply these changes?"
        error: "Error:"
        limit_warning: "limit exceeded"
      commands:
        send: "/code {prompt}"
        accept: "y"
        reject: "n"
        exit: "/exit"

  #
  # 3. AUTHENTICATION & SESSION
  #
  authentication:
    method: "persistent_session"
    check_command: "kimi auth status"
    credentials_storage: "~/.config/kimi/credentials.json"
    behavior:
      persistent: true
      reuse_between_tasks: true
      reauth_required: "only_if_401_or_expired"

  #
  # 4. SUBSCRIPTION MANAGEMENT
  #
  subscription_management:
    check_frequency: "before_every_task"
    
    methods:
      parse_welcome:
        command: "kimi --version --show-limits"
        regex_patterns:
          requests_remaining: "Remaining:\\s+(\\d+)\\s+requests"
          tokens_remaining: "(\\d+)\\s+tokens"
          tier: "Tier:\\s+(Pro|Basic|Free)"
          
    limits:
      threshold_warning: 10
      threshold_critical: 3
      
    actions_on_limit:
      - action: "suspend_queue"
        set_status: "paused_limit"
      - action: "notify_user"
        channels: ["webhook", "telegram", "email"]
      - action: "poll_resume"
        interval: "1h"
        condition: "limit_reset_or_upgraded"

  #
  # 5. PROMPT FORMATTING
  #
  prompt_template:
    engine: "jinja2"
    structure: |
      # Task ID: {{task.id}}
      # Project: {{project.name}}
      # Provider: Kimi Code CLI
      
      ## Goal
      {{spec.goal}}
      
      ## Instructions
      {{spec.instructions}}
      
      ## Constraints
      {{#each spec.constraints}}
      - {{this}}
      {{/each}}
      
      ## Context (from PARA)
      {{#each context_files}}
      File: {{path}}
      ```
      {{content}}
      ```
      {{/each}}
      
      {{#if spec.expected_output}}
      ## Expected Output
      {{spec.expected_output}}
      {{/if}}
      
      ---
      Instructions: Execute task. {{#if auto_apply}}Apply changes immediately.{{else}}Ask for confirmation before applying.{{/if}}

  #
  # 6. RESULT HANDLING
  #
  result_handling:
    success:
      condition: "exit_code == 0 AND validation_passed"
      git_commit:
        message_template: "{{kimi_summary}} | Task: {{task_id}}"
        auto_push: false
        
    failure_types:
      syntax_error:
        pattern: "exit_code=1 AND stderr contains 'SyntaxError'"
        retry: true
        
      validation_failed:
        pattern: "tests failed"
        retry: false
        action: "archive_lesson"
        
      limit_reached:
        pattern: "limit exceeded OR 'quota' in stdout"
        retry: false
        action: "pause_all_tasks"
        
    partial_success:
      pattern: "exit_code=2 OR 'Continue?' in output"
      handling:
        yolo_mode: "send 'y' automatically"
        conservative_mode: "pause_for_manual_review"

  #
  # 7. SAFETY & ISOLATION
  #
  safety:
    workspace_isolation:
      method: "git_worktree"
      description: "Each task runs in clean worktree to avoid cross-contamination"
      
    filesystem:
      allowed_paths:
        - "{{project.repo_path}}"
      forbidden_paths:
        - "/etc"
        - "~/.ssh"
        - "{{agent.config_dir}}"
        - "/root"
        
    network:
      kimi_can_browse: true
      block_if_spec_says: "spec.blocks_network == true"

  #
  # 8. SPEC SCHEMA EXTENSION
  #
  spec_schema_extensions:
    llm_provider:
      type: "kimi_cli"
      properties:
        mode: 
          enum: ["batch", "interactive"]
          default: "batch"
        auto_apply: 
          type: "boolean"
          default: false
        context_depth:
          enum: ["standard", "extended", "max"]
          
    execution:
      batch_mode: true
      poll_interval: 0
      on_limit: "pause_queue"

  #
  # 9. CLI COMMANDS (User Interface)
  #
  cli_commands:
    doctor:
      command: "agent doctor kimi"
      checks:
        - "kimi installed"
        - "version compatible"
        - "authenticated"
        - "subscription tier"
        - "remaining quota"
        
    batch_run:
      command: "agent run batch --project <name> --provider kimi_cli"
      behavior: "run execution_flow until exhaustion"
      
    status:
      command: "agent status limits"
      shows:
        - "remaining requests"
        - "current tier"
        - "queue status"

  #
  # 10. IMPLEMENTATION CHECKLIST FOR KIMI CODE
  #
  implementation_checklist:
    modules_to_create:
      - path: "vps_dev_agent/bridges/kimi_cli/__init__.py"
        contains: ["KimiBatchExecutor", "KimiAuthChecker"]
        
      - path: "vps_dev_agent/bridges/kimi_cli/expect_driver.py"
        condition: "if native_batch not available"
        
      - path: "vps_dev_agent/bridges/kimi_cli/limit_checker.py"
        methods: ["get_remaining_quota", "is_near_limit"]
        
    executor_integration:
      file: "vps_dev_agent/core/executor.py"
      add_branch: "if provider == 'kimi_cli': return run_batch_loop()"
      
    database_updates:
      add_fields:
        - "tasks.kimi_tokens_used: integer"
        - "tasks.kimi_exit_code: integer"
        - "projects.kimi_context_depth: enum"